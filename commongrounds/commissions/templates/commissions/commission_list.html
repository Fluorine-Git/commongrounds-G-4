{% extends "commissionrequests/base.html" %}

{% block body %}
    <h3> Types </h3>
    <ul>
        {% for type in types %}
            <li> {{type.name}}: {{type.description}}</li>
        {% endfor %}
    </ul>
    <h3> Requests </h3>
    <ul>
        {% for request in requests %}
            <li> <a href='{{ request.get_absolute_url }}'>{{request.title}}</a> </li>
        {% endfor %}
    </ul>
{% endblock %}
